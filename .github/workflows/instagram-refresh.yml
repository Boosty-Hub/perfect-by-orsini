name: Refresh Instagram feed

# Every 4 days, fetch the latest @doctororsini posts and update
# src/content/instagram.ts. Commits only when the posts changed, which (when the
# repo is connected to Vercel/Netlify) triggers a redeploy with the fresh feed.
on:
  schedule:
    - cron: "17 9 */4 * *" # ~09:17 UTC, every 4th day of the month
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: instagram-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pull latest Instagram posts
        run: node scripts/pull-instagram.mjs || echo "Instagram fetch failed or was blocked; leaving the feed unchanged."

      - name: Commit if the feed changed
        run: |
          if [[ -n "$(git status --porcelain src/content/instagram.ts)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/content/instagram.ts
            git commit -m "chore: refresh Instagram feed (latest @doctororsini posts)"
            git push
            echo "Feed updated."
          else
            echo "No new posts — nothing to commit."
          fi
